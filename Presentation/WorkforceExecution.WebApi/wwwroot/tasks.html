<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Görevlerim | Workforce Execution</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/site.css" rel="stylesheet">
</head>
<body>
  <div id="navbar"></div>
  <div class="container-fluid px-4">
    <div class="card p-3">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0">Bana Atanan İşler <span class="text-muted small">(T0 / Gün Sonu)</span></h5>
        <input type="date" id="listDate" class="form-control form-control-sm" style="width:auto" onchange="loadTasks()">
      </div>
      <div class="table-responsive">
        <table class="table table-sm">
          <thead>
            <tr><th>KKK</th><th>Project</th><th>İş</th><th>Plan Qty</th><th>Plan MD</th>
                <th>Crew</th><th>Fact</th><th>Durum</th><th>Aksiyon</th></tr>
          </thead>
          <tbody id="taskRows"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Crew modal -->
  <div class="modal fade" id="crewModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h6 class="modal-title">Crew Oluştur</h6>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <table class="table table-sm"><tbody id="crewRows"></tbody></table>
          <button class="btn btn-sm btn-outline-primary" onclick="addCrewRow()">+ Worker Type Ekle</button>
        </div>
        <div class="modal-footer">
          <button class="btn btn-success btn-sm" onclick="saveCrew()">Crew'u Kaydet ve İşi Al</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Fact modal -->
  <div class="modal fade" id="factModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h6 class="modal-title">Gün Sonu Verisi</h6>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <div class="row g-2 mb-2">
            <div class="col"><label class="form-label small">Fact Quantity</label>
              <input type="number" step="0.001" id="factQty" class="form-control form-control-sm"></div>
            <div class="col"><label class="form-label small">Fact Man-Day</label>
              <input type="number" step="0.5" id="factMd" class="form-control form-control-sm"></div>
            <div class="col"><label class="form-label small">Overtime (saat)</label>
              <input type="number" step="0.5" id="overtime" class="form-control form-control-sm" value="0"></div>
          </div>
          <div class="mb-2"><label class="form-label small">Comment <span class="text-muted">(iş başlamadı/bitmediyse zorunlu)</span></label>
            <textarea id="comment" class="form-control form-control-sm" rows="2"></textarea></div>
          <div><label class="form-label small">ZZZ Detay</label>
            <input id="zzzDetail" class="form-control form-control-sm"></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-success btn-sm" onclick="saveFact()">Onaya Gönder</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@8.0.7/dist/browser/signalr.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/tasks.js"></script>
</body>
</html>
