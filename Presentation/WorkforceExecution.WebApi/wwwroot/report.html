<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Daily Report | Workforce Execution</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/site.css" rel="stylesheet">
</head>
<body>
  <div id="navbar"></div>
  <div class="container-fluid px-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="mb-0">Daily Report <span class="text-muted small">— onaylanan kayıtların konsolidasyonu (canlı)</span></h5>
      <input type="date" id="listDate" class="form-control form-control-sm" style="width:auto" onchange="loadReport()">
    </div>

    <div class="row g-3 mb-4" id="kpiCards"></div>

    <div class="card p-3">
      <div class="table-responsive">
        <table class="table table-sm">
          <thead>
            <tr><th>KKK</th><th>Project</th><th>ToW/SToW/SSToW</th><th>Type of Code</th>
                <th>Plan Qty</th><th>Fact Qty</th><th>Plan MD</th><th>Fact MD</th>
                <th>OT</th><th>Verim %</th><th>Crew</th><th>ZZZ</th></tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@8.0.7/dist/browser/signalr.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/report.js"></script>
</body>
</html>
