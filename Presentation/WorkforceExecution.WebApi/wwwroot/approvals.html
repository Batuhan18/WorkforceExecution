<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Onay Kuyruğu | Workforce Execution</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/site.css" rel="stylesheet">
</head>
<body>
  <div id="navbar"></div>
  <div class="container-fluid px-4">
    <div class="card p-3">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0">Onayımı Bekleyen Kayıtlar</h5>
        <input type="date" id="listDate" class="form-control form-control-sm" style="width:auto" onchange="loadApprovals()">
      </div>
      <div class="table-responsive">
        <table class="table table-sm">
          <thead>
            <tr><th>KKK</th><th>Project</th><th>İş</th><th>Plan Qty / MD</th><th>Fact Qty / MD</th>
                <th>Verim %</th><th>Crew</th><th>Comment</th><th>Onay Geçmişi</th><th>Aksiyon</th></tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@8.0.7/dist/browser/signalr.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/approvals.js"></script>
</body>
</html>
